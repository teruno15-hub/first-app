<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist ToDo</title>
    <style>
        /* モダンなCSSカスタムプロパティ（デザインシステム） */
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #2d3748;
            --text-muted: #718096;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --accent-light: #e0e7ff;
            --success: #10b981;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --border-radius: 16px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ダークモード対応 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
                --card-bg: rgba(30, 41, 59, 0.8);
                --text-main: #f1f5f9;
                --text-muted: #94a3b8;
                --accent: #6366f1;
                --accent-hover: #4f46e5;
                --accent-light: #312e81;
                --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            }
        }

        /* リセット & 基本設定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: var(--transition);
        }

        /* コンテナ（カード） */
        .app-container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 100%;
            max-width: 540px;
            border-radius: var(--border-radius);
            padding: 32px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ヘッダー */
        header {
            margin-bottom: 24px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(to right, var(--accent), #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 進捗・ステータスバー */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.02);
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 24px;
        }

        .stats-count {
            font-weight: 600;
            color: var(--text-main);
        }

        /* タスク入力フォーム */
        .input-form {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .todo-input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid transparent;
            border-radius: 12px;
            font-size: 1rem;
            background: rgba(0, 0, 0, 0.04);
            color: var(--text-main);
            outline: none;
            transition: var(--transition);
        }

        @media (prefers-color-scheme: dark) {
            .todo-input {
                background: rgba(255, 255, 255, 0.05);
            }
        }

        .todo-input:focus {
            border-color: var(--accent);
            background: var(--card-bg);
            box-shadow: 0 0 0 4px var(--accent-light);
        }

        .add-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .add-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .add-btn:active {
            transform: translateY(1px);
        }

        /* フィルタータブ（すべて/未完了/完了） */
        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding-bottom: 12px;
        }

        @media (prefers-color-scheme: dark) {
            .filter-tabs {
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 6px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 6px;
            transition: var(--transition);
        }

        .tab-btn.active {
            color: var(--accent);
            background: var(--accent-light);
        }

        @media (prefers-color-scheme: dark) {
            .tab-btn.active {
                color: #a5b4fc;
            }
        }

        /* タスクリスト */
        .todo-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 4px;
        }

        /* スクロールバーのカスタマイズ */
        .todo-list::-webkit-scrollbar {
            width: 6px;
        }
        .todo-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .todo-list::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
        @media (prefers-color-scheme: dark) {
            .todo-list::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.1);
            }
        }

        /* タスクアイテム */
        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.02);
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(0, 0, 0, 0.01);
            transition: var(--transition);
            animation: slideIn 0.25s ease-out;
        }

        @media (prefers-color-scheme: dark) {
            .todo-item {
                background: rgba(255, 255, 255, 0.02);
            }
        }

        .todo-item:hover {
            transform: translateX(2px);
            background: rgba(0, 0, 0, 0.04);
        }

        @media (prefers-color-scheme: dark) {
            .todo-item:hover {
                background: rgba(255, 255, 255, 0.04);
            }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        /* チェックボックスとテキストのグループ */
        .todo-content {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            cursor: pointer;
        }

        /* カスタムチェックボックス */
        .checkbox-container {
            display: block;
            position: relative;
            width: 22px;
            height: 22px;
            user-select: none;
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 22px;
            width: 22px;
            background-color: transparent;
            border: 2px solid var(--text-muted);
            border-radius: 50%;
            transition: var(--transition);
        }

        .checkbox-container:hover input ~ .checkmark {
            border-color: var(--accent);
        }

        .checkbox-container input:checked ~ .checkmark {
            background-color: var(--success);
            border-color: var(--success);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
        }

        .checkbox-container input:checked ~ .checkmark:after {
            display: block;
        }

        .checkbox-container .checkmark:after {
            left: 7px;
            top: 3px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        /* タスクテキスト */
        .todo-text {
            font-size: 1rem;
            color: var(--text-main);
            transition: var(--transition);
            word-break: break-all;
            padding-right: 8px;
        }

        .completed .todo-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* 削除ボタン */
        .delete-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn:hover {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        /* 空状態のプレースホルダー */
        .empty-state {
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
            display: none;
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* モバイル対応の調整 */
        @media (max-width: 480px) {
            body {
                padding: 12px;
                align-items: flex-start;
            }

            .app-container {
                padding: 20px;
                margin-top: 10px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .todo-input {
                padding: 12px 14px;
                font-size: 0.95rem;
            }

            .add-btn {
                padding: 0 16px;
                font-size: 0.95rem;
            }

            .todo-item {
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>My ToDos</h1>
            <p style="color: var(--text-muted); font-size: 0.9rem;">今日もタスクを整理して、充実した一日にしましょう。</p>
        </header>

        <!-- 進捗ステータス -->
        <div class="status-bar">
            <div>
                完了済み: <span id="completed-count" class="stats-count">0</span> / <span id="total-count" class="stats-count">0</span>
            </div>
            <div id="progress-percent" style="font-weight: 600; color: var(--accent);">0%</div>
        </div>

        <!-- タスク追加エリア -->
        <form id="todo-form" class="input-form">
            <input 
                type="text" 
                id="todo-input" 
                class="todo-input" 
                placeholder="新しいタスクを入力..." 
                required 
                maxlength="100"
                autocomplete="off"
            >
            <button type="submit" class="add-btn">追加</button>
        </form>

        <!-- フィルタータブ -->
        <div class="filter-tabs">
            <button class="tab-btn active" data-filter="all">すべて</button>
            <button class="tab-btn" data-filter="active">未完了</button>
            <button class="tab-btn" data-filter="completed">完了</button>
        </div>

        <!-- 空状態のメッセージ -->
        <div id="empty-state" class="empty-state">
            <div class="empty-icon">📝</div>
            <p>タスクはありません。新しく追加してみましょう！</p>
        </div>

        <!-- タスク一覧 -->
        <ul id="todo-list" class="todo-list"></ul>
    </div>

    <script>
        // --- アプリケーションの状態管理 ---
        let todos = JSON.parse(localStorage.getItem('todos')) || [];
        let currentFilter = 'all'; // 'all' | 'active' | 'completed'

        // DOM要素の取得
        const todoForm = document.getElementById('todo-form');
        const todoInput = document.getElementById('todo-input');
        const todoList = document.getElementById('todo-list');
        const totalCountEl = document.getElementById('total-count');
        const completedCountEl = document.getElementById('completed-count');
        const progressPercentEl = document.getElementById('progress-percent');
        const emptyStateEl = document.getElementById('empty-state');
        const tabBtns = document.querySelectorAll('.tab-btn');

        // --- 関数の定義 ---

        // LocalStorageに保存
        function saveToLocalStorage() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        // タスク追加
        function addTodo(text) {
            const newTodo = {
                id: Date.now().toString(),
                text: text.trim(),
                completed: false
            };
            todos.unshift(newTodo); // 新しいものを先頭に追加
            saveToLocalStorage();
            render();
        }

        // タスクのトグル（完了・未完了）
        function toggleTodo(id) {
            todos = todos.map(todo => {
                if (todo.id === id) {
                    return { ...todo, completed: !todo.completed };
                }
                return todo;
            });
            saveToLocalStorage();
            render();
        }

        // タスク削除
        function deleteTodo(id) {
            todos = todos.filter(todo => todo.id !== id);
            saveToLocalStorage();
            render();
        }

        // 統計情報の更新
        function updateStats() {
            const total = todos.length;
            const completed = todos.filter(todo => todo.completed).length;
            
            totalCountEl.textContent = total;
            completedCountEl.textContent = completed;

            const percentage = total === 0 ? 0 : Math.round((completed / total) * 100);
            progressPercentEl.textContent = `${percentage}%`;
        }

        // レンダリング（再描画）
        function render() {
            // リストのクリア
            todoList.innerHTML = '';

            // フィルター適用
            const filteredTodos = todos.filter(todo => {
                if (currentFilter === 'active') return !todo.completed;
                if (currentFilter === 'completed') return todo.completed;
                return true;
            });

            // 空状態の表示制御
            if (filteredTodos.length === 0) {
                emptyStateEl.style.display = 'block';
                if (currentFilter === 'active') {
                    emptyStateEl.querySelector('p').textContent = '未完了のタスクはありません！';
                } else if (currentFilter === 'completed') {
                    emptyStateEl.querySelector('p').textContent = '完了したタスクはありません！';
                } else {
                    emptyStateEl.querySelector('p').textContent = 'タスクはありません。新しく追加してみましょう！';
                }
            } else {
                emptyStateEl.style.display = 'none';
            }

            // 要素を組み立ててDOMに追加
            filteredTodos.forEach(todo => {
                const li = document.createElement('li');
                li.className = `todo-item ${todo.completed ? 'completed' : ''}`;

                // チェックボックスとテキストのラッパー
                const contentDiv = document.createElement('div');
                contentDiv.className = 'todo-content';
                contentDiv.addEventListener('click', () => toggleTodo(todo.id));

                // カスタムチェックボックス
                const label = document.createElement('label');
                label.className = 'checkbox-container';
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = todo.completed;
                // クリックイベントが親要素(contentDiv)と二重で反応するのを防ぐ
                checkbox.addEventListener('click', (e) => e.stopPropagation()); 
                checkbox.addEventListener('change', () => toggleTodo(todo.id));

                const checkmark = document.createElement('span');
                checkmark.className = 'checkmark';

                label.appendChild(checkbox);
                label.appendChild(checkmark);

                // テキスト
                const textSpan = document.createElement('span');
                textSpan.className = 'todo-text';
                textSpan.textContent = todo.text;

                contentDiv.appendChild(label);
                contentDiv.appendChild(textSpan);

                // 削除ボタン
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.setAttribute('aria-label', 'タスクを削除');
                // ゴミ箱のSVGアイコン
                deleteBtn.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                `;
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteTodo(todo.id);
                });

                li.appendChild(contentDiv);
                li.appendChild(deleteBtn);
                todoList.appendChild(li);
            });

            updateStats();
        }

        // --- イベントリスナーの設定 ---

        // フォーム送信（タスク追加）
        todoForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = todoInput.value;
            if (text.trim() !== '') {
                addTodo(text);
                todoInput.value = ''; // 入力欄をクリア
                todoInput.focus();
            }
        });

        // フィルターボタンの切り替え
        tabBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                tabBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.getAttribute('data-filter');
                render();
            });
        });

        // 初期描画
        document.addEventListener('DOMContentLoaded', () => {
            render();
        });
    </script>
</body>
</html>
